<div class="flex flex-column align-items-center gap-4 p-4">
  <span class="text-6xl font-bold">{{ totalSeconds() | duration }}</span>

  <div class="flex gap-3">
    <p-button label="Start" (click)="start()" [disabled]="isRunning()" />
    <p-button label="Stop" severity="secondary" (click)="stop()" [disabled]="!isRunning()" />
    <p-button label="Reset" severity="danger" (click)="reset()" />
  </div>
</div>
